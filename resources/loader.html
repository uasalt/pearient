<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * {
            user-select: none;
        }

        body {
            background: transparent;
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            color: white;
        }

        .logo {
            width: 180px;
            height: 180px;
            animation: heartbeat 1.5s ease infinite;
            transition: transform 1s;
        }

        .subtitle {
            text-align: center;
            font-size: 26px;
            font-family: arial;
            margin: 10px 0 0 0;
        }

        @keyframes heartbeat {
            0% {
                transform: scale(0.95);
            }
            50% {
                transform: scale(1);
            }
            100% {
                transform: scale(0.95);
            }
        }
    </style>
</head>
<body>

<img class="logo" src="./assets/logo.png">
<p class="subtitle"></p>

<script>
const translations = {
    loading: {
        ru: "Загрузка",
        uk: "Завантаження",
        en: "Loading"
    },
    updating: {
        ru: "Обновление",
        uk: "Оновлення",
        en: "Updating"
    },
    noConnection: {
        ru: "Нет соединения.",
        uk: "Немає з'єднання.",
        en: "Connection error."
    },
    error: {
        ru: "Произошла критическая ошибка при загрузке!",
        uk: "Виникла критична помилка!",
        en: "Critical error!"
    },
    default: 'en'
}
let state = 'loading'

function translate() {
    for (const lang of navigator.languages) {
        if (!translations?.[state]?.[lang]) continue
        document.body.querySelector(".subtitle").textContent = translations[state][lang]
        break
    }
}

translate()

if (window.api) {
    window.api.registerStateUpdater(currState => {
        state = currState
        translate()
    })
}

if (!window.api) {
    alert(translations.error[navigator.language] || translations.error.en)
    window.close()
}
</script>
</body>
</html>
