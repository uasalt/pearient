<body>

<header>

        <input type="text" id="search" placeholder="Поиск">
        <div class="wallet">

        <button><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 1.966a1 1 0 0 0-.9.564l-.23.47-.51.1a1 1 0 0 0-.56 1.71l.38.36-.09.51a1 1 0 0 0 1.45 1.06L12 6.5l.46.24a1 1 0 0 0 .47.11 1 1 0 0 0 .59-.2 1 1 0 0 0 .39-1l-.09-.51.38-.36a1 1 0 0 0-.56-1.71L13.13 3l-.23-.47a1 1 0 0 0-.9-.564zM9 9a1 1 0 0 0-1 1v5H3a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1v-7a1 1 0 0 0-1-1h-5v-3a1 1 0 0 0-1-1H9z"></path></svg> Зал славы</button>

    </div>
    <div class="page">
        <div class="scroll">
            <div class="online">
                <!-- <div class="title">Сейчас онлайн</div> -->
            </div>
            <div class="createPost">
                <textarea placeholder="Текст поста..." maxlength="30000" rows="1"></textarea>
                <div class="buttons">
                    <div class="left">
                        <button id="addFile"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-paperclip-icon lucide-paperclip"><path d="m16 6-8.414 8.586a2 2 0 0 0 2.829 2.829l8.414-8.586a4 4 0 1 0-5.657-5.657l-8.379 8.551a6 6 0 1 0 8.485 8.485l8.379-8.551"/></svg></button>
                        <button id="emoji"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-smile-icon lucide-smile"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/></svg></button>
                    </div>
                    <div class="right">
                        <button id="send">Опубликовать</button>
                    </div>
                </div>
            </div>
            <div class="slider feedSelector">
                <button value="last">Последние</button>
                <button value="rec">Рекомендации</button>
                <button value="subscribe">Подписки</button>
            </div>
            <div class="feed"></div>
            <div class="empty">Здесь пусто.</div>
        </div>
        <div class="information">
            <div class="slider infoSelector">
                <button value="client" active>Клиент</button>
                <button value="social">Соц. сеть</button>
            </div>
            <div class="title">Обновление 1.0</div>
            <div class="changelog"></div>
        </div>
    </div>
</div>

<script src="./js/hk.js"></script>
<script src="./js/cache.js" type="module"></script>
<script src="./js/main.js" type="module"></script>

</html>
